name: agent-platform

# Server deployment (host 172.16.6.76) — all backing infrastructure.
# Differs from docker-compose.yml only where a client outside the host must
# reach a service by the server IP (Kafka advertised listener).
#
#   docker compose -f docker-compose.server.yml up -d
#   docker compose -f docker-compose.server.yml ps
#   docker compose -f docker-compose.server.yml down        (add -v to wipe data)

services:
  # ─────────────── PostgreSQL 16 (relational DB) ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_platform
    ports:
      - "5433:5432"   # host 5433 — 5432 already used by an existing Postgres on the server
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── Redis 7 (cache / sessions) ───────────────
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── Qdrant (vector DB) ───────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: agent-qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"   # REST / dashboard — host 6335 (6333 used by an existing Qdrant)
      - "6336:6334"   # gRPC — host 6336 (6334 used by an existing Qdrant)
    volumes:
      - qdrant_data:/qdrant/storage

  # ─────────────── Apache Kafka (event bus, KRaft single node) ───────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: agent-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # NOTE: bind host left empty (not 0.0.0.0) — the apache/kafka image otherwise
      # leaks 0.0.0.0 into advertised.listeners and refuses to start.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Advertised as the server IP so external clients (backend on another host) can connect.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.16.6.76:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────── MinIO (S3-compatible object storage) ───────────────
  minio:
    image: minio/minio:latest
    container_name: agent-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  kafka_data:
  minio_data:
